services:
  - type: web
    name: nailstuff-mcp
    runtime: docker
    plan: starter
    healthCheckPath: /health
    envVars:
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOP_DOMAIN
        sync: false
      - key: SHOPIFY_ACCESS_TOKEN
        sync: false
      - key: MCP_AUTH_TOKEN
        sync: false
      - key: SHOPIFY_API_VERSION
        value: "2026-07"
      - key: HOST_URL
        fromService:
          type: web
          name: nailstuff-mcp
          property: host
      - key: PORT
        value: "3000"
